name: email-env
version: 0.1.0

environment:
  module: server.email_env_environment
  class: EmailEnv

tasks:
  - name: classify
    description: Classify email
    grader:
      type: reward

  - name: priority
    description: Assign priority
    grader:
      type: reward

  - name: reply
    description: Generate reply
    grader:
      type: reward

models:
  observation: models.EmailObservation
  action: models.EmailAction
  state: models.EmailState