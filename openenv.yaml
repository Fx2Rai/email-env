name: email-env
version: 0.1.0

environment:
  module: server.email_env_environment
  class: EmailEnv

tasks:
  - id: classify
    name: classify
    description: Classify email as spam, important, or normal
    difficulty: easy
    grader: tasks.classify.grader:grade

  - id: priority
    name: priority
    description: Classify email and assign priority level (high/low)
    difficulty: medium
    grader: tasks.priority.grader:grade

  - id: reply
    name: reply
    description: Generate an appropriate reply to the email
    difficulty: hard
    grader: tasks.reply.grader:grade

models:
  observation: models.EmailObservation
  action: models.EmailAction
  state: models.EmailState